<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ensamblado de Genomas - K‑meros</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f5fc;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
            padding: 30px 35px 40px;
            transition: all 0.2s;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a2a3a;
            margin: 0 0 6px 0;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 small {
            font-size: 16px;
            font-weight: 400;
            color: #4a6a85;
        }

        .subtitle {
            color: #3a5a7a;
            font-size: 15px;
            border-left: 4px solid #2c7be5;
            padding-left: 16px;
            margin-bottom: 28px;
            background: #f0f7fe;
            border-radius: 0 8px 8px 0;
            line-height: 1.6;
            padding: 10px 16px;
        }

        /* Controles */
        .controls {
            background: #f8fbff;
            border-radius: 16px;
            padding: 22px 25px;
            margin-bottom: 28px;
            border: 1px solid #e2ebf5;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 20px 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            flex: 1 0 160px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #1f3348;
            margin-bottom: 5px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }

        .radio-group label {
            font-weight: 400;
            text-transform: none;
            font-size: 14px;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            accent-color: #2c7be5;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .control-group input[type="text"] {
            padding: 10px 14px;
            border: 1.5px solid #d0dcec;
            border-radius: 10px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 15px;
            background: white;
            transition: border 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .control-group input[type="text"]:focus {
            border-color: #2c7be5;
            outline: none;
            box-shadow: 0 0 0 3px rgba(44, 123, 229, 0.15);
        }

        .slider-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 4px 16px 4px 16px;
            border-radius: 30px;
            border: 1px solid #dee8f2;
            flex: 1 0 180px;
        }

        .slider-item label {
            font-size: 13px;
            font-weight: 600;
            color: #1e2f3f;
            min-width: 70px;
        }

        .slider-item input[type="range"] {
            flex: 1;
            min-width: 70px;
            accent-color: #2c7be5;
            height: 5px;
            background: #dbe4ed;
            border-radius: 4px;
            cursor: pointer;
        }

        .slider-item .value-badge {
            background: #eef4fa;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            color: #1a2a3a;
            min-width: 28px;
            text-align: center;
        }

        .btn-primary {
            background: #1a3a5a;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            padding: 14px 32px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(26, 58, 90, 0.2);
            letter-spacing: 0.3px;
            flex: 1 0 200px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background: #0f2a44;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(26, 58, 90, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Resultados */
        .results {
            margin-top: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            font-size: 22px;
            font-weight: 600;
            color: #1a2a3a;
            margin-bottom: 16px;
            border-bottom: 2px solid #e6edf5;
            padding-bottom: 8px;
        }

        .error-msg {
            background: #fee8e8;
            color: #b33c3c;
            padding: 14px 20px;
            border-radius: 12px;
            border-left: 5px solid #d9534f;
            font-weight: 500;
            margin: 10px 0;
        }

        /* Dashboard */
        .dashboard {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-family: 'Segoe UI', sans-serif;
            flex-wrap: wrap;
        }

        .dashboard-card {
            flex: 1;
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            min-width: 200px;
        }

        .dashboard-card .label {
            font-size: 11px;
            color: #7f8c8d;
            font-weight: bold;
            display: block;
        }

        .dashboard-card .value {
            font-size: 16px;
            font-weight: bold;
        }

        .dashboard-card .desc {
            font-size: 12px;
            color: #000000;
            margin: 4px 0 0 0;
        }

        .kmer-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }

        .kmer-tag {
            background-color: #e67e22;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-weight: bold;
            font-size: 13px;
        }

        .grafo-box {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 6px;
        }

        .grafo-box .arrow {
            color: #2ecc71;
            font-weight: bold;
        }

        .grafo-box .sufijo {
            color: #3498db;
            font-weight: bold;
        }

        .grafo-box .pieza {
            color: #95a5a6;
        }

        .analysis-box {
            background-color: #eaf2f8;
            border-left: 5px solid #3498db;
            padding: 18px;
            margin-top: 15px;
            border-radius: 4px;
            font-family: 'Segoe UI', sans-serif;
        }

        .analysis-box h4 {
            color: #1b4f72;
            margin-top: 0;
            font-weight: bold;
            font-size: 16px;
        }

        .analysis-box p {
            color: #000000;
            font-size: 13.5px;
            line-height: 1.5;
            margin: 10px 0;
        }

        .analysis-box .highlight {
            color: #e74c3c;
            font-weight: bold;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 13px;
            color: #6a8aaa;
            text-align: center;
            border-top: 1px solid #e6edf5;
            padding-top: 18px;
        }

        @media (max-width: 700px) {
            .container { padding: 20px 16px; }
            .controls { flex-direction: column; align-items: stretch; gap: 16px; }
            .dashboard { flex-direction: column; }
            .btn-primary { width: 100%; }
            .slider-item { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="container">

    <h1>
        🧬 Simulador de Ensamblado de Genomas
        <small>K‑meros y grafos</small>
    </h1>
    <div class="subtitle">
        Convierte una palabra en ADN o ingresa nucleótidos directamente para evaluar los desafíos informáticos de la secuenciación.
    </div>

    <!-- Panel de controles -->
    <div class="controls">
        <div class="control-group">
            <label>Tipo de entrada</label>
            <div class="radio-group" id="tipoEntrada">
                <label><input type="radio" name="tipo" value="texto" checked> Texto / Palabra Clave</label>
                <label><input type="radio" name="tipo" value="adn"> Secuencia ADN Pura (A,T,C,G)</label>
            </div>
        </div>

        <div class="control-group">
            <label for="entrada">Escribe aquí</label>
            <input type="text" id="entrada" value="BIOLOGIA" placeholder="Ej: BIOLOGIA o ATGCTTCGAT">
        </div>

        <div class="slider-item">
            <label for="kSlider">Tamaño K</label>
            <input type="range" id="kSlider" min="3" max="6" value="4" step="1">
            <span class="value-badge" id="kVal">4</span>
        </div>

        <button class="btn-primary" id="simularBtn">🚀 Ejecutar Secuenciación Avanzada</button>
    </div>

    <!-- Área de resultados -->
    <div id="resultsContainer" class="results"></div>

    <div class="footer-note">
        Simulador educativo · Ensamblado de genomas mediante k‑meros · <span style="color:#2c7be5;">Repetitividad</span> y grafos
    </div>
</div>

<script>
    (function() {
        // Elementos DOM
        const radioText = document.querySelector('input[name="tipo"][value="texto"]');
        const radioADN = document.querySelector('input[name="tipo"][value="adn"]');
        const entradaInput = document.getElementById('entrada');
        const kSlider = document.getElementById('kSlider');
        const kVal = document.getElementById('kVal');
        const simularBtn = document.getElementById('simularBtn');
        const resultsContainer = document.getElementById('resultsContainer');

        // Actualizar valor mostrado del slider
        kSlider.addEventListener('input', () => { kVal.textContent = kSlider.value; });

        // Actualizar placeholder según tipo de entrada
        function actualizarPlaceholder() {
            if (radioText.checked) {
                entradaInput.placeholder = 'Ej: BIOLOGIA';
                if (entradaInput.value.trim() === '' || /^[ATCG]+$/i.test(entradaInput.value.trim())) {
                    entradaInput.value = 'BIOLOGIA';
                }
            } else {
                entradaInput.placeholder = 'Ej: ATGCTTCGAT';
                if (entradaInput.value.trim() === '' || !/^[ATCG]+$/i.test(entradaInput.value.trim())) {
                    entradaInput.value = 'ATGCTTCGAT';
                }
            }
        }

        radioText.addEventListener('change', actualizarPlaceholder);
        radioADN.addEventListener('change', actualizarPlaceholder);

        // --- Lógica principal ---
        function textoAADN(texto) {
            let textoLimpio = texto.replace(/[^a-zA-Z]/g, '').toUpperCase();
            if (!textoLimpio) return 'ATGCTTCGAT';

            const mapa = {
                'A':'A','B':'T','C':'C','D':'G','E':'A','F':'T','G':'C','H':'G','I':'A','J':'T',
                'K':'C','L':'G','M':'A','N':'T','Ñ':'C','O':'G','P':'A','Q':'T','R':'C','S':'G',
                'T':'A','U':'T','V':'C','W':'G','X':'A','Y':'T','Z':'C'
            };
            let adn = '';
            for (let ch of textoLimpio) {
                adn += mapa[ch] || 'A';
            }
            while (adn.length < 12) adn += 'ATCG';
            return adn.slice(0, 20);
        }

        function descomponerEnKmeros(secuencia, k) {
            if (secuencia.length < k) return [];
            const kmeros = [];
            for (let i = 0; i <= secuencia.length - k; i++) {
                kmeros.push(secuencia.substring(i, i + k));
            }
            return kmeros;
        }

        function evaluarRepetitividad(kmeros) {
            if (!kmeros || kmeros.length === 0) {
                return { nivel: 'ERROR 🔴', color: '#e74c3c', desc: 'No hay fragmentos suficientes.' };
            }
            const unicos = new Set(kmeros);
            if (unicos.size === kmeros.length) {
                return { nivel: 'FÁCIL 🟢', color: '#2ecc71', desc: 'Línea recta sin desvíos. La computadora armará el genoma al instante.' };
            } else if (kmeros.length - unicos.size <= 2) {
                return { nivel: 'INTERMEDIO 🟡', color: '#f1c40f', desc: 'Hay algunos cruces. El software tendrá que calcular rutas alternativas.' };
            } else {
                return { nivel: 'DIFÍCIL (CRÍTICO) 🔴', color: '#e74c3c', desc: '¡Bucle detectado! Hay demasiados fragmentos idénticos. El ensamblador puede confundirse.' };
            }
        }

        function generarInterfaz(entradaUsuario, tipoEntrada, tamanoK) {
            let adnReal;
            let contextoOrigen;
            const entradaLimpia = entradaUsuario.trim();

            if (tipoEntrada === 'texto') {
                adnReal = textoAADN(entradaLimpia);
                contextoOrigen = `Traducido desde el mensaje: '<b>${entradaLimpia}</b>'`;
            } else {
                // Filtrar solo A,T,C,G
                adnReal = entradaLimpia.toUpperCase().replace(/[^ATCG]/g, '');
                contextoOrigen = 'Secuencia de ADN ingresada directamente.';
            }

            if (!adnReal || adnReal.length < tamanoK) {
                return `<div class="error-msg">⚠️ Error: Ingresa una secuencia válida (letras para texto o A, T, C, G para ADN) que sea mayor o igual al tamaño de K (${tamanoK}).</div>`;
            }

            const kmeros = descomponerEnKmeros(adnReal, tamanoK);
            const { nivel, color, desc } = evaluarRepetitividad(kmeros);

            // Dashboard
            let html = `
                <div class="dashboard">
                    <div class="dashboard-card" style="border: 2px solid ${color};">
                        <span class="label">DIFICULTAD DE ENSAMBLADO</span>
                        <span class="value" style="color: ${color};">${nivel}</span>
                        <p class="desc">${desc}</p>
                    </div>
                    <div class="dashboard-card" style="border: 2px solid #3498db;">
                        <span class="label">REPORTE DE SECUENCIACIÓN</span>
                        <span class="value" style="color: #1b4f72;">Genoma: ${adnReal}</span>
                        <p class="desc">${contextoOrigen}<br>Total de piezas generadas: <b>${kmeros.length}</b></p>
                    </div>
                </div>
            `;

            // K-meros
            html += `<h4 style="color:#1a2a3a; font-size:14px; margin:5px 0;">🧩 Fragmentos de Lectura Corta (K-meros):</h4>`;
            html += `<div class="kmer-container">`;
            for (let km of kmeros) {
                html += `<span class="kmer-tag">${km}</span>`;
            }
            html += `</div>`;

            // Grafo
            html += `<h4 style="color:#1a2a3a; font-size:14px; margin:10px 0;">🕸️ Conexiones del Grafo Informático:</h4>`;
            html += `<div class="grafo-box">`;
            for (let item of kmeros) {
                const prefijo = item.slice(0, -1);
                const sufijo = item.slice(1);
                html += `  <span class="arrow">${prefijo}</span> ➔ <span class="sufijo">${sufijo}</span> <span class="pieza">(Pieza: ${item})</span><br>`;
            }
            html += `</div>`;

            // Análisis pedagógico
            html += `
                <div class="analysis-box">
                    <h4>🔬 Análisis Bioinformático para el Aula:</h4>
                    <p>
                        🛰️ <b>¿Cómo desciframos el mapa?</b><br>
                        Al fragmentar el ADN en bloques de <b>K = ${tamanoK}</b>, las superposiciones nos permiten conectar el final de una lectura con el inicio de otra. Imagina que el grafo es una red de estaciones de tren: si logras encontrar una ruta continua que recorra todas las vías, la computadora podrá reconstruir con éxito el mensaje biológico original.
                    </p>
                    <p>
                        🧬 <b>La conexión con la Biología Real:</b><br>
                        En el genoma de muchos organismos existen secuencias repetitivas. Cuando los secuenciadores cortan esas áreas, el panel de dificultad se enciende en <b><span style="color:${color};">ROJO o AMARILLO</span></b>. Esto le demuestra a los estudiantes que el software informático necesita algoritmos avanzados para no perderse en las repeticiones del código de la vida.
                    </p>
                </div>
            `;

            return html;
        }

        function procesarSimulacion() {
            const tipo = radioText.checked ? 'texto' : 'adn';
            const entrada = entradaInput.value;
            const k = parseInt(kSlider.value, 10);

            const resultado = generarInterfaz(entrada, tipo, k);
            resultsContainer.innerHTML = resultado;
        }

        // Eventos
        simularBtn.addEventListener('click', procesarSimulacion);

        // Ejecutar al cargar la página (con valores por defecto)
        window.addEventListener('load', () => {
            actualizarPlaceholder();
            procesarSimulacion();
        });

        // Ejecutar con Enter en el campo de texto
        entradaInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') procesarSimulacion();
        });

        // También actualizar al cambiar el slider (opcional, pero para mejor UX)
        kSlider.addEventListener('change', procesarSimulacion);
        // Actualizar al cambiar radio
        radioText.addEventListener('change', procesarSimulacion);
        radioADN.addEventListener('change', procesarSimulacion);
    })();
</script>
</body>
</html>
